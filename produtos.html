<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas | Produtos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 32px rgba(79, 70, 229, 0.13) !important;
        }

        .product-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px 10px 0 0;
            background: #f3f4f6;
        }

        .product-img-placeholder {
            width: 100%;
            height: 180px;
            background: linear-gradient(135deg, #ede9fe, #ddd6fe);
            border-radius: 10px 10px 0 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-drop-zone {
            border: 2px dashed #c4b5fd;
            border-radius: 10px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            background: #faf5ff;
        }

        .img-drop-zone:hover,
        .img-drop-zone.drag-over {
            background: #ede9fe;
            border-color: #7c3aed;
        }

        .img-preview {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 8px;
        }
    </style>
</head>

<body class="bg-light-mesh">

    <div id="app-layout">
        <div id="app-sidebar"></div>

        <div id="page-content" class="py-4 px-4">
            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-3">
                <div>
                    <h2 class="fw-bold mb-0">Catálogo de Produtos</h2>
                    <p class="text-muted mb-0">Clica num produto para editar ou eliminar.</p>
                </div>
                <div class="d-flex gap-2 align-items-center">
                    <div class="input-group" style="max-width:220px">
                        <span class="input-group-text bg-white border-end-0"><i
                                class="bi bi-search text-muted"></i></span>
                        <input type="text" class="form-control bg-white border-start-0" id="searchProd"
                            placeholder="Pesquisar...">
                    </div>
                    <a href="calculadora.html" class="btn btn-primary fw-semibold">
                        <i class="bi bi-plus-circle me-1"></i> Novo Produto
                    </a>
                </div>
            </div>

            <!-- GRID -->
            <div class="row g-4" id="produtosGrid">
                <div class="col-12 text-center py-5 text-muted">
                    <div class="spinner-border text-primary mb-3" role="status"></div>
                    <p>A carregar produtos...</p>
                </div>
            </div>
        </div>
    </div>

    <!-- ===================== MODAL EDITAR ===================== -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Editar Produto</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body px-4">
                    <input type="hidden" id="editId">
                    <div class="row g-3">
                        <div class="col-12 col-md-4">
                            <!-- Imagem -->
                            <label class="form-label text-muted small fw-bold text-uppercase">Imagem do Produto</label>
                            <div class="img-drop-zone" id="dropZone"
                                onclick="document.getElementById('imgInput').click()">
                                <img id="imgPreview" class="img-preview d-none" alt="preview">
                                <div id="dropPlaceholder">
                                    <i class="bi bi-cloud-upload fs-2 text-primary d-block mb-2"></i>
                                    <span class="text-muted small">Clica ou arrasta a imagem aqui</span>
                                </div>
                            </div>
                            <input type="file" id="imgInput" accept="image/*" class="d-none">
                            <button class="btn btn-outline-danger btn-sm mt-2 w-100 d-none" id="removeImgBtn">
                                <i class="bi bi-trash me-1"></i> Remover Imagem
                            </button>
                        </div>

                        <div class="col-12 col-md-8">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Nome</label>
                                <input type="text" class="form-control bg-light" id="editName">
                            </div>
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Custo Peça
                                        (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editBase">
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Caixa (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editBox">
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Etiqueta
                                        (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editLabel">
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Preço de Venda
                                        (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editFinalPrice">
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Teu Lucro
                                        (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editProfit">
                                </div>
                                <div class="col-6">
                                    <label class="form-label text-muted small fw-bold text-uppercase">Comissão Colab.
                                        (€)</label>
                                    <input type="number" step="0.01" class="form-control bg-light" id="editColab">
                                </div>
                            </div>
                            <!-- Status Toggles -->
                            <div class="row mt-3 g-2">
                                <div class="col-6">
                                    <div class="form-check form-switch p-2 bg-light rounded d-flex align-items-center" style="border: 1px solid #e2e8f0; cursor: pointer;" onclick="document.getElementById('editOutStock').click()">
                                        <input class="form-check-input ms-0 me-2 mb-0 mt-0" type="checkbox" role="switch" id="editOutStock" onclick="event.stopPropagation();">
                                        <label class="form-check-label fw-bold small text-uppercase flex-grow-1" for="editOutStock" style="cursor: pointer;">Esgotado</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check form-switch p-2 bg-light rounded d-flex align-items-center" style="border: 1px solid #bfdbfe; cursor: pointer;" onclick="document.getElementById('editOrdered').click()">
                                        <input class="form-check-input ms-0 me-2 mb-0 mt-0" type="checkbox" role="switch" id="editOrdered" onclick="event.stopPropagation();" style="border-color:#3b82f6; background-color:#eff6ff;">
                                        <label class="form-check-label fw-bold small text-uppercase text-primary flex-grow-1" for="editOrdered" style="cursor: pointer;">Encomendado</label>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <div class="form-check form-switch p-2 bg-light rounded d-flex align-items-center" style="border: 1px solid #bbf7d0; cursor: pointer;" onclick="document.getElementById('editAvailable').click()">
                                        <input class="form-check-input ms-0 me-2 mb-0 mt-0" type="checkbox" role="switch" id="editAvailable" onclick="event.stopPropagation();" style="border-color:#22c55e; background-color:#f0fdf4;">
                                        <label class="form-check-label fw-bold small text-uppercase text-success flex-grow-1" for="editAvailable" style="cursor: pointer;">Disponível</label>
                                    </div>
                                </div>
                            </div>
                        <!-- Localização da Peça (admin only) -->
                        <div class="mt-3" id="itemLocationField">
                            <label class="form-label text-muted small fw-bold text-uppercase">Peça está com...</label>
                            <select class="form-select bg-light" id="editItemLocation">
                                <option value="admin">📦 Em minha posse</option>
                            </select>
                            <small class="text-muted">Indica quem tem fisicamente esta peça.</small>
                        </div>
                        <!-- Investidor (admin only) -->
                        <div class="mt-3" id="investmentField">
                            <label class="form-label text-muted small fw-bold text-uppercase">Comprado com fundos de:</label>
                            <select class="form-select bg-light" id="editInvestment">
                                <option value="">💰 Nenhum (Fundo Próprio)</option>
                            </select>
                            <small class="text-muted">Opcional. A que investimento aberto ou fechado esta peça está anexada.</small>
                        </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-between">
                    <button class="btn btn-outline-danger fw-semibold" id="btnDelete">
                        <i class="bi bi-trash me-1"></i> Eliminar Produto
                    </button>
                    <div class="d-flex gap-2">
                        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        <button class="btn btn-primary fw-semibold" id="btnSaveEdit">
                            <i class="bi bi-floppy me-1"></i> Guardar Alterações
                        </button>
                    </div>
                </div>
                <div id="editMsg" class="text-center small pb-3 d-none"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="app.js"></script>
    <script>
        const BUCKET = 'product-images';
        let todosProdutos = [];
        let newImageFile = null;
        let removeCurrentImage = false;

        // ---- CARREGAR PRODUTOS ----
        document.addEventListener('DOMContentLoaded', async () => {
            try { await requireAuth(); } catch (e) { return; }
            await carregarConfiguracoes(); // Garante que COLAB_PCT está carregada

            if (window.currentUser?.type === 'collaborator') {
                document.getElementById('itemLocationField')?.classList.add('d-none');
                document.getElementById('investmentField')?.classList.add('d-none');
            } else {
                await carregarColabsLocation();
                await carregarInvestimentos();
            }
            await renderProdutos();
            document.getElementById('searchProd').addEventListener('input', e => {
                const q = e.target.value.toLowerCase();
                renderGrid(todosProdutos.filter(p => p.name.toLowerCase().includes(q)));
            });
            setupImageUpload();

            // Auto-recalcular preços no modal quando custa muda
            ['editBase', 'editBox', 'editLabel'].forEach(id => {
                document.getElementById(id).addEventListener('input', recalcularModalCustos);
            });
            // Auto-recalcular lucro quando mudo manualmente o Preço Final
            document.getElementById('editFinalPrice').addEventListener('input', recalcularModalFinal);
        });

        function recalcularModalCustos() {
            const b = parseFloat(document.getElementById('editBase').value) || 0;
            const bx = parseFloat(document.getElementById('editBox').value) || 0;
            const l = parseFloat(document.getElementById('editLabel').value) || 0;
            const total = b + bx + l;

            // Respeitar o método de cálculo definido nas configurações
            let finalPrice;
            if (typeof CALC_METHOD !== 'undefined' && CALC_METHOD === '100pct') {
                finalPrice = (b * 2) + bx + l; // Método 100%
            } else {
                finalPrice = total * 3; // Método 3x (padrão)
            }
            document.getElementById('editFinalPrice').value = finalPrice.toFixed(2);
            
            const net = finalPrice - total;
            const pct = typeof COLAB_PCT !== 'undefined' ? COLAB_PCT : 40;
            const fee = net * (pct / 100);
            const prof = net - fee;
            
            document.getElementById('editProfit').value = prof.toFixed(2);
            document.getElementById('editColab').value = fee.toFixed(2);
        }

        function recalcularModalFinal() {
            const b = parseFloat(document.getElementById('editBase').value) || 0;
            const bx = parseFloat(document.getElementById('editBox').value) || 0;
            const l = parseFloat(document.getElementById('editLabel').value) || 0;
            const total = b + bx + l;
            
            const finalPrice = parseFloat(document.getElementById('editFinalPrice').value) || 0;
            const net = finalPrice - total;
            const pct = typeof COLAB_PCT !== 'undefined' ? COLAB_PCT : 40;
            const fee = net * (pct / 100);
            const prof = net - fee;
            
            document.getElementById('editProfit').value = prof.toFixed(2);
            document.getElementById('editColab').value = fee.toFixed(2);
        }

        async function carregarColabsLocation() {
            const sel = document.getElementById('editItemLocation');
            const { data } = await db.from('collaborators')
                .select('name').eq('user_id', window.currentUser.id).eq('status', 'active').order('name');
            (data || []).forEach(c => {
                const o = document.createElement('option');
                o.value = c.name;
                o.textContent = '👤 Com ' + c.name;
                sel.appendChild(o);
            });
        }

        async function carregarInvestimentos() {
            const sel = document.getElementById('editInvestment');
            if(!sel) return;
            // Carrega os fundos que o usuario admin tenha registado
            const { data, error } = await db.from('investments')
                .select('id, amount, status, created_at, investors(name)')
                .eq('user_id', window.currentUser.id)
                .order('created_at', { ascending: false });
            
            if(!error && data) {
                data.forEach(inv => {
                    const o = document.createElement('option');
                    o.value = inv.id;
                    const dateStr = inv.created_at ? new Date(inv.created_at).toLocaleDateString('pt-PT') : '';
                    const statusTxt = inv.status === 'completed' ? '(Devolvido)' : '(Aberto)';
                    o.textContent = `💼 ${inv.investors?.name || 'Investidor'} | ${dateStr} - €${parseFloat(inv.amount).toFixed(2)} ${statusTxt}`;
                    sel.appendChild(o);
                });
            }
        }

        async function renderProdutos() {
            const isColab = window.currentUser.type === 'collaborator';
            const uid = isColab ? window.currentUser.admin_user_id : window.currentUser.id;
            
            let data, error;
            if (isColab) {
                const res = await db.rpc('get_products_for_collaborator', { admin_uid: uid, colab_id: window.currentUser.id });
                data = res.data; error = res.error;
            } else {
                const res = await db.from('products').select('*').eq('user_id', uid).order('created_at', { ascending: false });
                data = res.data; error = res.error;
            }

            if (error) {
                document.getElementById('produtosGrid').innerHTML =
                    '<div class="col-12 text-center text-danger py-5">Erro ao carregar produtos.</div>';
                return;
            }
            todosProdutos = data || [];
            renderGrid(todosProdutos);
        }

        function renderGrid(list) {
            const grid = document.getElementById('produtosGrid');
            if (!list.length) {
                grid.innerHTML = `<div class="col-12 text-center py-5 text-muted">
                    <i class="bi bi-inbox display-3 d-block opacity-25 mb-3"></i>
                    Sem produtos. <a href="calculadora.html">Adiciona o primeiro!</a>
                </div>`;
                return;
            }
            grid.innerHTML = list.map(p => {
                const sym = window.CURRENCY_SYMBOL || '€';
                let badge = '';
                let cardStyle = '';
                let opacityClass = '';
                
                if (p.is_ordered) {
                    badge += '<span class="position-absolute badge rounded-pill bg-primary" style="z-index:10; top:8px; left:8px;">ENCOMENDADO</span>';
                    cardStyle = 'border: 2px solid #93c5fd !important; background-color: #eff6ff !important';
                }
                if (p.is_available) {
                    badge += '<span class="position-absolute badge rounded-pill bg-success" style="z-index:10; top:8px; right:8px;">DISPONÍVEL</span>';
                }
                if (p.is_out_of_stock && !p.is_ordered && !p.is_available) {
                    badge += '<span class="position-absolute badge rounded-pill bg-danger" style="z-index:10; top:8px; left:8px;">ESGOTADO</span>';
                    cardStyle = 'filter: grayscale(100%);';
                    opacityClass = 'opacity-50';
                }

                return `
                <div class="col-sm-6 col-lg-4 col-xl-3 position-relative">
                    ${badge}
                    <div class="card product-card glass-card shadow-sm h-100 ${opacityClass}" style="cursor:pointer; ${cardStyle}" onclick="abrirEditar('${p.id}')">
                        ${p.image_url
                    ? `<img src="${p.image_url}" class="product-img" alt="${p.name}">`
                    : `<div class="product-img-placeholder"><i class="bi bi-gem text-primary opacity-50 fs-1"></i></div>`
                }
                        <div class="card-body p-3">
                            <h6 class="fw-bold mb-1">${p.name}</h6>
                            <div class="d-flex justify-content-between align-items-center mt-2">
                                <span class="text-success fw-bold fs-5">${sym}${parseFloat(p.final_sale_price).toFixed(2)}</span>
                                <small class="text-muted">custo: ${sym}${parseFloat(p.base_cost).toFixed(2)}</small>
                            </div>
                            <hr class="opacity-25 my-2">
                            <div class="d-flex justify-content-between small">
                                <span class="text-info">Lucro: ${sym}${parseFloat(p.profit_margin).toFixed(2)}</span>
                                <span class="text-warning">Colab: ${sym}${parseFloat(p.collaborator_fee).toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                </div>
                `;
            }).join('');
        }

        // ---- ABRIR MODAL EDITAR ----
        function abrirEditar(id) {
            const p = todosProdutos.find(x => x.id === id);
            if (!p) return;
            newImageFile = null;
            removeCurrentImage = false;

            // Atualizar labels com o símbolo da moeda correto
            const sym = window.CURRENCY_SYMBOL || '€';
            document.querySelectorAll('#editModal label').forEach(lbl => {
                lbl.textContent = lbl.textContent.replace(/\(€\)/, `(${sym.trim()})`).replace(/\(R\$\)/, `(${sym.trim()})`);
            });

            document.getElementById('editId').value = p.id;
            document.getElementById('editName').value = p.name;
            document.getElementById('editBase').value = parseFloat(p.base_cost).toFixed(2);
            document.getElementById('editBox').value = parseFloat(p.box_cost).toFixed(2);
            document.getElementById('editLabel').value = parseFloat(p.label_cost).toFixed(2);
            document.getElementById('editFinalPrice').value = parseFloat(p.final_sale_price).toFixed(2);
            document.getElementById('editProfit').value = parseFloat(p.profit_margin).toFixed(2);
            document.getElementById('editColab').value = parseFloat(p.collaborator_fee).toFixed(2);
            document.getElementById('editItemLocation').value = p.item_location || 'admin';
            document.getElementById('editInvestment').value = p.current_investment_id || '';
            document.getElementById('editOutStock').checked = Boolean(p.is_out_of_stock);
            document.getElementById('editOrdered').checked = Boolean(p.is_ordered);
            document.getElementById('editAvailable').checked = Boolean(p.is_available);
            document.getElementById('editMsg').classList.add('d-none');

            // Imagem
            const preview = document.getElementById('imgPreview');
            const placeholder = document.getElementById('dropPlaceholder');
            const removeBtn = document.getElementById('removeImgBtn');
            if (p.image_url) {
                preview.src = p.image_url;
                preview.classList.remove('d-none');
                placeholder.classList.add('d-none');
                removeBtn.classList.remove('d-none');
            } else {
                preview.classList.add('d-none');
                placeholder.classList.remove('d-none');
                removeBtn.classList.add('d-none');
            }

            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // ---- GUARDAR EDIÇÃO ----
        document.getElementById('btnSaveEdit').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            const p = todosProdutos.find(x => x.id === id);
            const btn = document.getElementById('btnSaveEdit');
            const msg = document.getElementById('editMsg');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> A guardar...';

            let image_url = p?.image_url || null;

            // Upload nova imagem
            if (newImageFile) {
                const ext = newImageFile.name.split('.').pop();
                const path = `${id}_${Date.now()}.${ext}`;
                const { error: upErr } = await db.storage.from(BUCKET).upload(path, newImageFile, { upsert: true });
                if (upErr) {
                    msg.className = 'text-center small py-2 text-danger';
                    msg.textContent = 'Erro no upload: ' + upErr.message;
                    msg.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-floppy me-1"></i> Guardar Alterações';
                    return;
                }
                const { data: urlData } = db.storage.from(BUCKET).getPublicUrl(path);
                image_url = urlData.publicUrl;
            }
            if (removeCurrentImage) image_url = null;

            const isColab = window.currentUser?.type === 'collaborator';
            const adminUserId = isColab ? window.currentUser.admin_user_id : window.currentUser.id;

            const updates = {
                name: document.getElementById('editName').value.trim(),
                base_cost: parseFloat(document.getElementById('editBase').value) || 0,
                box_cost: parseFloat(document.getElementById('editBox').value) || 0,
                label_cost: parseFloat(document.getElementById('editLabel').value) || 0,
                final_sale_price: parseFloat(document.getElementById('editFinalPrice').value) || 0,
                profit_margin: parseFloat(document.getElementById('editProfit').value) || 0,
                collaborator_fee: parseFloat(document.getElementById('editColab').value) || 0,
                item_location: document.getElementById('editItemLocation').value || 'admin',
                current_investment_id: document.getElementById('editInvestment').value || null,
                is_out_of_stock: document.getElementById('editOutStock').checked,
                is_ordered: document.getElementById('editOrdered').checked,
                is_available: document.getElementById('editAvailable').checked,
                image_url
            };

            // Log do investimento se alterou (apenas admins importam-se disto e podem ver editInvestment)
            if(!isColab && p) {
                const newInvId = document.getElementById('editInvestment').value || null;
                const oldInvId = p.current_investment_id || null;
                // Se era null e passou a não-null, ou mudou de um fund para o outro
                if (newInvId && newInvId !== oldInvId) {
                    // Inserir log imutável
                    await db.from('investment_product_log').insert([{
                        user_id: window.currentUser.id,
                        investment_id: newInvId,
                        product_id: p.id,
                        product_name: p.name,
                        product_image: image_url || p.image_url,
                        cost_at_assignment: updates.base_cost
                    }]);
                } else if(!newInvId && oldInvId) {
                    // Foi desanexado do fundo. Marcamos a data unassigned_at no último log aberto
                    await db.from('investment_product_log').update({ unassigned_at: new Date().toISOString() })
                        .eq('product_id', p.id).eq('investment_id', oldInvId).is('unassigned_at', null);
                }
            }

            let error;
            if (isColab) {
                const res = await db.rpc('update_product_as_collaborator', { 
                    colab_id: window.currentUser.id, 
                    admin_uid: adminUserId, 
                    prod_id: id, 
                    updates_data: updates 
                });
                error = res.error || (res.data?.error ? { message: res.data.error } : null);
            } else {
                const res = await db.from('products').update(updates).eq('id', id);
                error = res.error;
            }
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-floppy me-1"></i> Guardar Alterações';

            if (error) {
                msg.className = 'text-center small py-2 text-danger';
                msg.textContent = 'Erro: ' + error.message;
                msg.classList.remove('d-none');
            } else {
                bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                await renderProdutos();
            }
        });

        // ---- ELIMINAR PRODUTO ----
        document.getElementById('btnDelete').addEventListener('click', async () => {
            const id = document.getElementById('editId').value;
            if (!confirm('Tens a certeza que queres eliminar este produto? Não pode ser desfeito.')) return;
            
            let error;
            if (window.currentUser?.type === 'collaborator') {
                const res = await db.rpc('delete_product_as_collaborator', { 
                    colab_id: window.currentUser.id, 
                    admin_uid: window.currentUser.admin_user_id, 
                    prod_id: id 
                });
                error = res.error || (res.data?.error ? { message: res.data.error } : null);
            } else {
                const res = await db.from('products').delete().eq('id', id);
                error = res.error;
            }
            if (error) { alert('Erro: ' + error.message); return; }
            bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
            await renderProdutos();
        });

        // ---- SETUP UPLOAD DE IMAGEM ----
        function setupImageUpload() {
            const input = document.getElementById('imgInput');
            const dropZone = document.getElementById('dropZone');
            const preview = document.getElementById('imgPreview');
            const holder = document.getElementById('dropPlaceholder');
            const removeBtn = document.getElementById('removeImgBtn');

            function setPreview(file) {
                newImageFile = file;
                removeCurrentImage = false;
                const reader = new FileReader();
                reader.onload = e => {
                    preview.src = e.target.result;
                    preview.classList.remove('d-none');
                    holder.classList.add('d-none');
                    removeBtn.classList.remove('d-none');
                };
                reader.readAsDataURL(file);
            }

            input.addEventListener('change', () => { if (input.files[0]) setPreview(input.files[0]); });

            dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
            dropZone.addEventListener('drop', e => {
                e.preventDefault();
                dropZone.classList.remove('drag-over');
                if (e.dataTransfer.files[0]) setPreview(e.dataTransfer.files[0]);
            });

            removeBtn.addEventListener('click', e => {
                e.stopPropagation();
                preview.src = '';
                preview.classList.add('d-none');
                holder.classList.remove('d-none');
                removeBtn.classList.add('d-none');
                newImageFile = null;
                removeCurrentImage = true;
            });
        }
    </script>
</body>
