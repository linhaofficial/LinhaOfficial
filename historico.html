<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas | Histórico de Vendas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light-mesh">

    <div id="app-layout">
        <div id="app-sidebar"></div>

        <div id="page-content" class="py-4 px-4">

            <!-- HEADER -->
            <div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3">
                <div>
                    <h2 class="fw-bold mb-0">Histórico de Vendas</h2>
                    <p class="text-muted mb-0">Todas as vendas registadas com detalhe completo.</p>
                </div>
                <button class="btn btn-outline-danger fw-semibold" onclick="exportarPDF()">
                    <i class="bi bi-file-earmark-pdf me-1"></i> Exportar PDF
                </button>
            </div>

            <!-- RESUMO DO PERÍODO -->
            <div class="row g-3 mb-4" id="statsRow">
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm glass-card">
                        <div class="card-body py-3 px-4">
                            <div class="text-muted small">Total Vendas</div>
                            <div class="fw-bold fs-4" id="stTotal">€0,00</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm glass-card">
                        <div class="card-body py-3 px-4">
                            <div class="text-muted small">Teu Lucro</div>
                            <div class="fw-bold fs-4 text-success" id="stProfit">€0,00</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm glass-card">
                        <div class="card-body py-3 px-4">
                            <div class="text-muted small">Comissões Pagas</div>
                            <div class="fw-bold fs-4 text-warning" id="stColab">€0,00</div>
                        </div>
                    </div>
                </div>
                <div class="col-6 col-md-3">
                    <div class="card border-0 shadow-sm glass-card">
                        <div class="card-body py-3 px-4">
                            <div class="text-muted small">Descontos Dados</div>
                            <div class="fw-bold fs-4 text-danger" id="stDiscount">€0,00</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FILTROS -->
            <div class="card glass-card border-0 shadow-sm mb-3">
                <div class="card-body py-3 px-4">
                    <div class="row g-2 align-items-end">
                        <div class="col-12 col-md-4">
                            <label class="text-muted small fw-bold text-uppercase d-block mb-1">Pesquisar</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0"><i
                                        class="bi bi-search text-muted"></i></span>
                                <input type="text" class="form-control bg-light border-start-0" id="filterSearch"
                                    placeholder="Cliente, colaborador...">
                            </div>
                        </div>
                        <div class="col-6 col-md-2">
                            <label class="text-muted small fw-bold text-uppercase d-block mb-1">De</label>
                            <input type="date" class="form-control bg-light" id="filterFrom">
                        </div>
                        <div class="col-6 col-md-2">
                            <label class="text-muted small fw-bold text-uppercase d-block mb-1">Até</label>
                            <input type="date" class="form-control bg-light" id="filterTo">
                        </div>
                        <div class="col-6 col-md-2" id="colabFilterWrapper">
                            <label class="text-muted small fw-bold text-uppercase d-block mb-1">Colaborador</label>
                            <select class="form-select bg-light" id="filterColab">
                                <option value="">Todos</option>
                                <option value="none">Venda Própria</option>
                            </select>
                        </div>
                        <div class="col-6 col-md-2 d-flex gap-2">
                            <button class="btn btn-primary w-100" onclick="aplicarFiltros()"><i
                                    class="bi bi-funnel"></i> Filtrar</button>
                            <button class="btn btn-outline-secondary" onclick="limparFiltros()" title="Limpar"><i
                                    class="bi bi-x-lg"></i></button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- TABELA PRINCIPAL -->
            <div class="card glass-card border-0 shadow-sm">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light text-muted small text-uppercase">
                                <tr>
                                    <th class="px-4 py-3">Data</th>
                                    <th>Cliente</th>
                                    <th>Colaborador</th>
                                    <th class="text-end">Preço Original</th>
                                    <th class="text-end">Desconto</th>
                                    <th class="text-end">Valor Pago</th>
                                    <th class="text-end">Teu Lucro</th>
                                    <th class="text-end">Comissão</th>
                                    <th class="text-center">Ações</th>
                                </tr>
                            </thead>
                            <tbody id="salesTable">
                                <tr>
                                    <td colspan="9" class="text-center py-5 text-muted">A carregar...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div
                    class="card-footer bg-white border-top-0 py-3 px-4 d-flex justify-content-between align-items-center">
                    <small class="text-muted" id="tableCount">0 vendas</small>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DETALHE -->
    <div class="modal fade" id="saleDetailModal" tabindex="-1">
        <div class="modal-dialog modal-md">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Detalhe da Venda</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="saleModalBody">
                    <!-- preenchido dinamicamente -->
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-outline-danger btn-sm" id="deleteSaleBtn">
                        <i class="bi bi-trash me-1"></i> Apagar Venda
                    </button>
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="app.js"></script>
    <script>
        let todasAsVendas = [];
        let vendasFiltradas = [];
        let modalVendaId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            try { await requireAuth(); } catch (e) { return; }
            const hoje = new Date();
            document.getElementById('filterFrom').value = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('filterTo').value = hoje.toISOString().split('T')[0];
            await carregarVendas();
            document.getElementById('filterSearch').addEventListener('input', aplicarFiltros);
        });

        async function carregarVendas() {
            const isColab = window.currentUser.type === 'collaborator';
            const uid = isColab ? window.currentUser.admin_user_id : window.currentUser.id;

            if (isColab) {
                document.getElementById('colabFilterWrapper').classList.add('d-none');
            }

            let query = db.from('sales').select('*').eq('user_id', uid).order('created_at', { ascending: false });
            if (isColab) {
                query = query.eq('collaborator_name', window.currentUser.name);
            }

            const { data, error } = await query;

            if (error) {
                document.getElementById('salesTable').innerHTML =
                    '<tr><td colspan="9" class="text-center py-5 text-danger">Erro ao carregar vendas.</td></tr>';
                return;
            }

            todasAsVendas = data || [];

            // Popular filtro de colaboradores
            const colabs = [...new Set(todasAsVendas.filter(s => s.collaborator_name).map(s => s.collaborator_name))];
            const sel = document.getElementById('filterColab');
            colabs.forEach(c => {
                const o = document.createElement('option');
                o.value = c;
                o.textContent = c;
                sel.appendChild(o);
            });

            aplicarFiltros();
        }

        function aplicarFiltros() {
            const q = document.getElementById('filterSearch').value.toLowerCase();
            const from = document.getElementById('filterFrom').value;
            const to = document.getElementById('filterTo').value;
            const colab = document.getElementById('filterColab').value;

            vendasFiltradas = todasAsVendas.filter(s => {
                const dateStr = s.created_at?.split('T')[0];
                if (from && dateStr < from) return false;
                if (to && dateStr > to) return false;
                if (colab === 'none' && s.collaborator_name) return false;
                if (colab && colab !== 'none' && s.collaborator_name !== colab) return false;
                if (q) {
                    const haystack = `${s.client_name || ''} ${s.client_phone || ''} ${s.collaborator_name || ''}`.toLowerCase();
                    if (!haystack.includes(q)) return false;
                }
                return true;
            });

            renderTabela(vendasFiltradas);
            atualizarStats(vendasFiltradas);
        }

        function limparFiltros() {
            document.getElementById('filterSearch').value = '';
            document.getElementById('filterColab').value = '';
            const hoje = new Date();
            document.getElementById('filterFrom').value = new Date(hoje.getFullYear(), hoje.getMonth(), 1).toISOString().split('T')[0];
            document.getElementById('filterTo').value = hoje.toISOString().split('T')[0];
            aplicarFiltros();
        }

        function renderTabela(list) {
            const tbody = document.getElementById('salesTable');
            document.getElementById('tableCount').textContent = list.length + ' venda' + (list.length !== 1 ? 's' : '');

            if (!list.length) {
                tbody.innerHTML = '<tr><td colspan="9" class="text-center py-5 text-muted"><i class="bi bi-inbox display-4 d-block opacity-25 mb-3"></i>Nenhuma venda encontrada.</td></tr>';
                return;
            }

            tbody.innerHTML = list.map(s => {
                const valorPago = parseFloat(s.final_price || s.total_price || 0);
                const desconto = parseFloat(s.discount || 0);
                const lucro = parseFloat(s.admin_profit || 0);
                const comissao = parseFloat(s.collaborator_fee || 0);
                const original = parseFloat(s.total_price || 0);
                const date = new Date(s.created_at).toLocaleDateString('pt-PT');
                const colabBadge = s.collaborator_name
                    ? `<span class="badge bg-light text-dark border">${s.collaborator_name}</span>`
                    : `<span class="badge bg-secondary">Própria</span>`;

                return `<tr>
                    <td class="px-4 text-muted small">${date}</td>
                    <td>
                        <div class="fw-semibold">${s.client_name || '<span class="text-muted">—</span>'}</div>
                        ${s.client_phone ? `<small class="text-muted"><i class="bi bi-telephone me-1"></i>${s.client_phone}</small>` : ''}
                    </td>
                    <td>${colabBadge}</td>
                    <td class="text-end text-muted">€${original.toFixed(2)}</td>
                    <td class="text-end">${desconto > 0 ? `<span class="text-danger fw-bold">-€${desconto.toFixed(2)}</span>` : '<span class="text-muted">—</span>'}</td>
                    <td class="text-end fw-bold text-success">€${valorPago.toFixed(2)}</td>
                    <td class="text-end text-info fw-semibold">€${lucro.toFixed(2)}</td>
                    <td class="text-end text-warning fw-semibold">${comissao > 0 ? '€' + comissao.toFixed(2) : '<span class="text-muted">—</span>'}</td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-outline-primary" onclick="abrirDetalhe('${s.id}')">
                            <i class="bi bi-eye"></i>
                        </button>
                    </td>
                </tr>`;
            }).join('');
        }

        function atualizarStats(list) {
            document.getElementById('stTotal').textContent = '€' + list.reduce((s, x) => s + parseFloat(x.final_price || x.total_price || 0), 0).toFixed(2);
            document.getElementById('stProfit').textContent = '€' + list.reduce((s, x) => s + parseFloat(x.admin_profit || 0), 0).toFixed(2);
            document.getElementById('stColab').textContent = '€' + list.reduce((s, x) => s + parseFloat(x.collaborator_fee || 0), 0).toFixed(2);
            document.getElementById('stDiscount').textContent = '€' + list.reduce((s, x) => s + parseFloat(x.discount || 0), 0).toFixed(2);
        }

        function abrirDetalhe(id) {
            const s = todasAsVendas.find(x => x.id === id);
            if (!s) return;
            modalVendaId = id;

            const valorPago = parseFloat(s.final_price || s.total_price || 0);
            const desconto = parseFloat(s.discount || 0);
            const lucro = parseFloat(s.admin_profit || 0);
            const comissao = parseFloat(s.collaborator_fee || 0);

            document.getElementById('saleModalBody').innerHTML = `
                <div class="list-group list-group-flush">
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Data</span>
                        <span class="fw-semibold">${new Date(s.created_at).toLocaleString('pt-PT')}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Cliente</span>
                        <span class="fw-semibold">${s.client_name || '—'}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Telefone</span>
                        <span>${s.client_phone || '—'}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Colaborador</span>
                        <span>${s.collaborator_name || '<span class="badge bg-secondary">Venda Própria</span>'}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Preço Original</span>
                        <span>€${parseFloat(s.total_price || 0).toFixed(2)}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Desconto</span>
                        <span class="text-danger fw-bold">${desconto > 0 ? '-€' + desconto.toFixed(2) : '—'}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between border-top border-2">
                        <span class="fw-bold">Valor Pago</span>
                        <span class="fw-bold fs-5 text-success">€${valorPago.toFixed(2)}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Teu Lucro</span>
                        <span class="text-info fw-bold">€${lucro.toFixed(2)}</span>
                    </div>
                    <div class="list-group-item px-0 d-flex justify-content-between">
                        <span class="text-muted">Comissão Colaborador</span>
                        <span class="text-warning fw-bold">${comissao > 0 ? '€' + comissao.toFixed(2) : '—'}</span>
                    </div>
                </div>
            `;

            new bootstrap.Modal(document.getElementById('saleDetailModal')).show();
        }

        // Apagar venda
        document.getElementById('deleteSaleBtn').addEventListener('click', async () => {
            if (!modalVendaId) return;
            if (!confirm('Tens a certeza que queres apagar esta venda? Esta ação não pode ser desfeita.')) return;

            const { error } = await db.from('sales').delete().eq('id', modalVendaId);
            if (error) { alert('Erro: ' + error.message); return; }

            bootstrap.Modal.getInstance(document.getElementById('saleDetailModal')).hide();
            todasAsVendas = todasAsVendas.filter(x => x.id !== modalVendaId);
            modalVendaId = null;
            aplicarFiltros();
        });

        function exportarPDF() {
            if (!vendasFiltradas.length) { alert('Sem dados para exportar!'); return; }
            const sym = window.CURRENCY_SYMBOL || '€';
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4'); // landscape

            const fromVal = document.getElementById('filterFrom').value;
            const toVal   = document.getElementById('filterTo').value;
            const periodo = fromVal && toVal ? `${fromVal} — ${toVal}` : 'Todos os registos';

            // Cabeçalho
            doc.setFillColor(79, 70, 229);
            doc.rect(0, 0, 297, 22, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont('helvetica', 'bold');
            doc.text('Painel de Vendas — Histórico', 14, 13);
            doc.setFontSize(9);
            doc.setFont('helvetica', 'normal');
            doc.text('Período: ' + periodo, 14, 19);
            doc.text('Gerado em ' + new Date().toLocaleString('pt-PT'), 220, 19);

            // Sumário
            const totVendas  = vendasFiltradas.reduce((s, x) => s + parseFloat(x.final_price || x.total_price || 0), 0);
            const totLucro   = vendasFiltradas.reduce((s, x) => s + parseFloat(x.admin_profit || 0), 0);
            const totColab   = vendasFiltradas.reduce((s, x) => s + parseFloat(x.collaborator_fee || 0), 0);
            const totDesc    = vendasFiltradas.reduce((s, x) => s + parseFloat(x.discount || 0), 0);

            doc.setTextColor(30, 30, 30);
            doc.setFontSize(8);
            doc.setFont('helvetica', 'bold');
            doc.text(`Total Vendas: ${sym}${totVendas.toFixed(2)}   |   Lucro Líquido: ${sym}${totLucro.toFixed(2)}   |   Comissões: ${sym}${totColab.toFixed(2)}   |   Descontos: ${sym}${totDesc.toFixed(2)}   |   Nº Registos: ${vendasFiltradas.length}`, 14, 29);

            // Tabela
            doc.autoTable({
                startY: 33,
                head: [['Data', 'Cliente', 'Telefone', 'Colaborador', 'Preço Original', 'Desconto', 'Valor Pago', 'Lucro', 'Comissão']],
                body: vendasFiltradas.map(s => [
                    new Date(s.created_at).toLocaleDateString('pt-PT'),
                    s.client_name || '—',
                    s.client_phone || '—',
                    s.collaborator_name || 'Venda Própria',
                    sym + parseFloat(s.total_price || 0).toFixed(2),
                    parseFloat(s.discount || 0) > 0 ? '-' + sym + parseFloat(s.discount).toFixed(2) : '—',
                    sym + parseFloat(s.final_price || s.total_price || 0).toFixed(2),
                    sym + parseFloat(s.admin_profit || 0).toFixed(2),
                    parseFloat(s.collaborator_fee || 0) > 0 ? sym + parseFloat(s.collaborator_fee).toFixed(2) : '—'
                ]),
                styles: { fontSize: 8, cellPadding: 2.5 },
                headStyles: { fillColor: [79, 70, 229], textColor: 255, fontStyle: 'bold' },
                alternateRowStyles: { fillColor: [245, 243, 255] },
                columnStyles: {
                    4: { halign: 'right' }, 5: { halign: 'right', textColor: [220, 38, 38] },
                    6: { halign: 'right', fontStyle: 'bold', textColor: [22, 163, 74] },
                    7: { halign: 'right', textColor: [37, 99, 235] },
                    8: { halign: 'right', textColor: [161, 98, 7] }
                },
                foot: [['', '', '', 'TOTAL', sym + vendasFiltradas.reduce((s,x) => s+parseFloat(x.total_price||0),0).toFixed(2),
                    '-' + sym + totDesc.toFixed(2), sym + totVendas.toFixed(2),
                    sym + totLucro.toFixed(2), sym + totColab.toFixed(2)]],
                footStyles: { fillColor: [30, 27, 75], textColor: 255, fontStyle: 'bold' },
                showFoot: 'lastPage'
            });

            const mes = new Date().toISOString().slice(0, 7);
            doc.save(`historico_vendas_${mes}.pdf`);
        }
    </script>
</body>

</html>
