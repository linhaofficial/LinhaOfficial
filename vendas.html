<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Vendas | Registar Venda</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light-mesh">

    <div id="app-layout">
        <div id="app-sidebar"></div>

        <div id="page-content" class="py-4 px-4">
            <div class="row justify-content-center">
                <div class="col-12 col-lg-7">
                    <div class="mb-4">
                        <h2 class="fw-bold mb-1">Registar Venda</h2>
                        <p class="text-muted">Preenche os dados da venda. Colaborador e telefone são opcionais.</p>
                    </div>

                    <div class="card glass-card border-0 shadow-sm">
                        <div class="card-body p-4">

                            <!-- PRODUTO -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Produto Vendido
                                    *</label>
                                <select class="form-select form-select-lg bg-light" id="saleProduct">
                                    <option value="">A carregar produtos...</option>
                                </select>
                                <!-- Info do produto após seleção -->
                                <div id="saleProductInfo" class="mt-3 p-3 rounded d-none"
                                    style="background:rgba(79,70,229,0.07); border: 1px solid rgba(79,70,229,0.15)">
                                    <div class="row text-center">
                                        <div class="col-4">
                                            <small class="text-muted d-block mb-1">Preço Original</small>
                                            <strong id="infoPriceTotal">-</strong>
                                        </div>
                                        <div class="col-4">
                                            <small class="text-muted d-block mb-1">Teu Lucro</small>
                                            <strong class="text-success" id="infoProfit">-</strong>
                                        </div>
                                        <div class="col-4">
                                            <small class="text-muted d-block mb-1">Comissão Colab.</small>
                                            <strong class="text-warning" id="infoColab">-</strong>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <!-- DESCONTO -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Desconto (€) <span
                                        class="text-muted fw-normal">(opcional)</span></label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-tag"></i></span>
                                    <input type="number" step="0.01" min="0" value="0"
                                        class="form-control bg-light border-start-0 fw-bold" id="saleDiscount">
                                </div>
                                <small class="text-muted">Será subtraído do preço final.</small>
                            </div>

                            <!-- PREÇO FINAL CALCULADO -->
                            <div class="alert border-0 mb-3 py-2 d-none" id="finalPriceBox"
                                style="background:rgba(16,185,129,0.1)">
                                <div class="d-flex justify-content-between align-items-center">
                                    <span class="text-muted">Preço Final a Cobrar:</span>
                                    <span class="fw-bold fs-5 text-success" id="finalPriceDisplay">€0,00</span>
                                </div>
                            </div>

                            <hr class="opacity-25 my-4">

                            <!-- CLIENTE -->
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold text-uppercase">Nome do Cliente <span
                                        class="text-muted fw-normal">(opcional)</span></label>
                                <input type="text" class="form-control form-control-lg bg-light" id="saleClient"
                                    placeholder="Ex: Maria Silva">
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold text-uppercase">Telefone do Cliente
                                    <span class="text-muted fw-normal">(opcional)</span></label>
                                <div class="input-group input-group-lg">
                                    <span class="input-group-text bg-light border-end-0"><i
                                            class="bi bi-telephone"></i></span>
                                    <input type="tel" class="form-control bg-light border-start-0" id="saleClientPhone"
                                        placeholder="9XX XXX XXX">
                                </div>
                            </div>

                            <hr class="opacity-25 my-4">

                            <!-- COLABORADOR -->
                            <div class="mb-4">
                                <label
                                    class="form-label text-muted small fw-bold text-uppercase d-flex align-items-center gap-2">
                                    Colaborador
                                    <span class="badge bg-secondary fw-normal">opcional</span>
                                </label>
                                <!-- Toggle: venda própria ou com colaborador -->
                                <div class="d-flex gap-2 mb-3">
                                    <button type="button" class="btn btn-sm btn-primary fw-semibold" id="btnColabNo"
                                        onclick="toggleColab(false)">
                                        <i class="bi bi-person me-1"></i> Venda Própria (sem colaborador)
                                    </button>
                                    <button type="button" class="btn btn-sm btn-outline-secondary fw-semibold"
                                        id="btnColabYes" onclick="toggleColab(true)">
                                        <i class="bi bi-people me-1"></i> Com Colaborador
                                    </button>
                                </div>
                                <div id="colabField" class="d-none">
                                    <select class="form-select form-select-lg bg-light" id="saleColaborador">
                                        <option value="">-- Selecionar colaborador --</option>
                                    </select>
                                </div>
                            </div>

                            <button type="button" class="btn btn-primary btn-lg w-100 fw-bold" id="saveSaleBtn">
                                <i class="bi bi-receipt me-2"></i> Registar Venda
                            </button>
                            <div id="saleMsg" class="text-center small mt-2 d-none"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="sidebar.js"></script>
    <script src="app.js"></script>
    <script>
        let hasColab = false;

        function toggleColab(show) {
            hasColab = show;
            document.getElementById('colabField').classList.toggle('d-none', !show);
            document.getElementById('btnColabYes').className = show
                ? 'btn btn-sm btn-primary fw-semibold'
                : 'btn btn-sm btn-outline-secondary fw-semibold';
            document.getElementById('btnColabNo').className = !show
                ? 'btn btn-sm btn-primary fw-semibold'
                : 'btn btn-sm btn-outline-secondary fw-semibold';
        }

        async function carregarColaboradores() {
            const sel = document.getElementById('saleColaborador');
            const { data, error } = await db
                .from('collaborators')
                .select('id, name')
                .eq('user_id', window.currentUser.id)
                .eq('status', 'active')
                .order('name');

            if (error || !data || !data.length) {
                sel.innerHTML = '<option value="">Sem colaboradores ativos</option>';
                return;
            }
            sel.innerHTML = '<option value="">-- Selecionar colaborador --</option>';
            data.forEach(c => {
                const o = document.createElement('option');
                o.value = c.name;
                o.textContent = c.name;
                sel.appendChild(o);
            });
        }

        function recalcFinalPrice() {
            const prodId = document.getElementById('saleProduct').value;
            const discount = parseFloat(document.getElementById('saleDiscount').value) || 0;
            const box = document.getElementById('finalPriceBox');
            const display = document.getElementById('finalPriceDisplay');
            if (!prodId) { box.classList.add('d-none'); return; }
            const prod = todosOsProdutos.find(x => x.id === prodId);
            if (!prod) return;
            display.textContent = '€' + Math.max(0, parseFloat(prod.final_sale_price) - discount).toFixed(2);
            box.classList.remove('d-none');
        }

        document.addEventListener('DOMContentLoaded', async () => {
            try { await requireAuth(); } catch (e) { return; }

            await carregarConfiguracoes();
            carregarProdutos();
            carregarColaboradores();

            document.getElementById('saleProduct').addEventListener('change', () => {
                mostrarInfoProduto();
                recalcFinalPrice();
            });
            document.getElementById('saleDiscount').addEventListener('input', recalcFinalPrice);
            document.getElementById('saveSaleBtn').addEventListener('click', () => guardarVendaCompleta(hasColab));
        });
    </script>
</body>

</html>
